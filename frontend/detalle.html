<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Noticia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand" href="index.html">Blog M9</a>
        </div>
    </nav>

    <div class="container mt-5">
        <div id="detalleContainer">
            <!-- La noticia se renderizará aquí -->
        </div>
        
        <h3 class="mt-5 mb-4 border-bottom pb-2">Comentarios</h3>
        <div id="comentariosContainer">
            <!-- Los comentarios se cargarán dinámicamente aquí -->
        </div>
        
        <!-- Paginación de Comentarios -->
        <nav aria-label="Page navigation comments">
            <ul class="pagination justify-content-center mt-3" id="paginacionComentarios">
            </ul>
        </nav>

        <div id="formComentarioContainer">
            <!-- Formulario de comentario o mensaje de iniciar sesión -->
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
