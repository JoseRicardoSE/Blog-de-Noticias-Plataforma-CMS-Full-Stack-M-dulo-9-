<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Noticia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand" href="index.html">Blog M9</a>
            <div class="d-flex" id="authButtons"></div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h3 class="mb-4">Editar noticia</h3>
                        <form id="editarNoticiaForm">
                            <div class="mb-3">
                                <label for="titulo" class="form-label">Título</label>
                                <input type="text" class="form-control" id="titulo" maxlength="100" required>
                                <div class="form-text text-muted small">Máximo 100 caracteres.</div>
                            </div>
                            <div class="mb-3">
                                <label for="copete" class="form-label">Copete / Resumen</label>
                                <textarea class="form-control" id="copete" rows="2" maxlength="250" required></textarea>
                                <div class="form-text text-muted small">Máximo 250 caracteres.</div>
                            </div>
                            <div class="mb-3">
                                <label for="contenido" class="form-label">Contenido completo</label>
                                <textarea class="form-control" id="contenido" rows="6" maxlength="5000" required></textarea>
                                <div class="form-text text-muted small">Máximo 5000 caracteres.</div>
                            </div>
                            <div class="mb-3">
                                <label for="categoria" class="form-label">Categoría</label>
                                <input type="text" class="form-control" id="categoria" required>
                            </div>
                            <div class="mb-3">
                                <label for="imagen" class="form-label">URL de Imagen</label>
                                <input type="url" class="form-control" id="imagen">
                            </div>
                            <button type="submit" class="btn btn-warning w-100">Actualizar Noticia</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
