<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog de Noticias - Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow">
        <div class="container">
            <a class="navbar-brand" href="index.html">Blog M9</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Inicio</a></li>
                </ul>
                <div class="d-flex" id="authButtons">
                    <!-- Dinámico: Login/Registro o Crear Noticia/Logout -->
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1 class="text-center mb-4">Últimas Noticias</h1>
        
        <!-- Barra de Búsqueda y Filtros -->
        <div class="row justify-content-center mb-4">
            <div class="col-md-8">
                <form id="searchForm" class="d-flex shadow-sm rounded">
                    <input type="text" id="searchInput" class="form-control border-0 rounded-start" placeholder="Buscar por título..." style="border-right: 1px solid #dee2e6 !important;">
                    <select id="categorySelect" class="form-select border-0" style="max-width: 200px; border-right: 1px solid #dee2e6 !important;">
                        <option value="">Todas las Categorías</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="Backend">Backend</option>
                        <option value="Herramientas">Herramientas</option>
                        <option value="Tecnología">Tecnología</option>
                        <option value="Desarrollo">Desarrollo</option>
                        <option value="WebAssembly">WebAssembly</option>
                    </select>
                    <button type="submit" class="btn btn-primary rounded-end px-4">Buscar</button>
                </form>
            </div>
        </div>

        <div class="row" id="noticiasContainer">
            <!-- Las tarjetas de noticias se inyectarán aquí -->
        </div>
        <!-- Paginación -->
        <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center mt-4" id="paginacionNoticias">
            </ul>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
